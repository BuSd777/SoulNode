name: SoulNode
options:
  bundleIdPrefix: com.soulseek
targets:
  SoulNode:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: [SoulSwift]
    info:
      path: SoulSwift/Info.plist
    entitlements: 
      path: SoulSwift/SoulNode.entitlements
    dependencies:
      - framework: Frameworks/Node.xcframework
        embed: true
    settings:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      AD_HOC_CODE_SIGNING_ALLOWED: YES
      ENABLE_BITCODE: NO
