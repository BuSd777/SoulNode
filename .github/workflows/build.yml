name: Build Full SoulNode
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Project
        run: xcodegen generate
      - name: Create Placeholder Binary
        run: |
          mkdir -p Sources/Resources
          echo "Placeholder for slskd binary" > Sources/Resources/slskd
          chmod +x Sources/Resources/slskd
      - name: Build IPA
        run: |
          xcodebuild clean archive -project SoulNode.xcodeproj -scheme SoulNode -configuration Release -archivePath SoulNode.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          mkdir -p Payload
          mv SoulNode.xcarchive/Products/Applications/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-Release
          path: SoulNode.ipa
