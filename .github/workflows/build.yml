name: Monolith Engine Build V3
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build Go Library for iOS
        run: |
          # Узнаем путь к iOS SDK
          export SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)
          export CLANG=$(xcrun --sdk iphoneos --find clang)
          
          # Собираем библиотеку, явно указывая iOS таргет для C-компилятора
          CGO_ENABLED=1 \
          CC="$CLANG -isysroot $SDKPATH -arch arm64 -miphoneos-version-min=15.0" \
          GOOS=ios GOARCH=arm64 \
          go build -buildmode=c-archive -o libengine.a engine.go
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build IPA
        run: |
          xcodegen generate
          xcodebuild clean archive -project SoulNode.xcodeproj -scheme SoulNode -configuration Release -archivePath SoulNode.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          mkdir -p Payload
          mv SoulNode.xcarchive/Products/Applications/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-Monolith-Final
          path: SoulNode.ipa
