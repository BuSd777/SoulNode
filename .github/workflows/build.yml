name: Real Engine Build V2
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Compile & Force Sign
        run: |
          mkdir -p Resources
          CGO_ENABLED=0 GOOS=ios GOARCH=arm64 go build -ldflags="-s -w" -o Resources/slskd main.go
          # Подписываем с использованием наших прав
          codesign --force --entitlements entitlements.plist -s - Resources/slskd
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build IPA
        run: |
          xcodegen generate
          xcodebuild clean archive -project SoulNode.xcodeproj -scheme SoulNode -configuration Release -archivePath SoulNode.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          mkdir -p Payload
          mv SoulNode.xcarchive/Products/Applications/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-Signed-Logic
          path: SoulNode.ipa
