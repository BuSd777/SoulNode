name: Monolith Engine Build
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build Go Library
        run: |
          # Компилируем Go в статическую библиотеку C-archive
          CGO_ENABLED=1 GOOS=ios GOARCH=arm64 go build -buildmode=c-archive -o libengine.a engine.go
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build IPA
        run: |
          xcodegen generate
          xcodebuild clean archive -project SoulNode.xcodeproj -scheme SoulNode -configuration Release -archivePath SoulNode.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          mkdir -p Payload
          mv SoulNode.xcarchive/Products/Applications/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-Monolith
          path: SoulNode.ipa
