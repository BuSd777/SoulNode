name: Global Update Build
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Compile Engine
        run: |
          mkdir -p Resources
          GOOS=ios GOARCH=arm64 CGO_ENABLED=0 go build -o Resources/slskd main.go
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate
        run: xcodegen generate
      - name: Build
        run: |
          xcodebuild clean archive -project SoulNode.xcodeproj -scheme SoulNode -configuration Release -archivePath SoulNode.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          mkdir -p Payload
          mv SoulNode.xcarchive/Products/Applications/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-Global-Update
          path: SoulNode.ipa
