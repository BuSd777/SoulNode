name: Build SoulNode IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Используем стабильную новую версию

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Go Framework
        run: |
          # Важный костыль: скачиваем исходники mobile вручную, чтобы gomobile их видел
          go get -d golang.org/x/mobile/bind
          gomobile init
          
          mkdir -p Frameworks
          cd go
          go mod tidy
          
          # Запускаем сборку фреймворка
          gomobile bind -target=ios -v -o ../Frameworks/Node.xcframework ./node

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build IPA
        run: |
          xcodegen generate
          xcodebuild build \
            -project SoulNode.xcodeproj \
            -scheme SoulNode \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload
          mv build/Release-iphoneos/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-IPA
          path: SoulNode.ipa
