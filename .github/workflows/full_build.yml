name: Build SoulNode IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with: {go-version: '1.21'}
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
      - name: Build Go Framework
        run: |
          mkdir -p Frameworks
          cd go
          go mod tidy
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile bind -target=ios -o ../Frameworks/Node.xcframework ./node
      - name: Build IPA
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild build -project SoulNode.xcodeproj -scheme SoulNode -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          mkdir -p Payload
          mv build/Release-iphoneos/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload
      - uses: actions/upload-artifact@v3
        with: {name: SoulNode-IPA, path: SoulNode.ipa}
