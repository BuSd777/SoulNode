name: Build SoulNode IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x' # Переходим на 1.25, как просит gomobile

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Go Framework
        env:
          GOPROXY: https://proxy.golang.org,direct # Используем прокси для обхода ошибки логина
        run: |
          cd go
          # Сначала добавляем нужные библиотеки принудительно
          go mod tidy
          go get github.com/crow-misia/slsk-go@main
          go get golang.org/x/mobile/bind
          
          gomobile init
          mkdir -p ../Frameworks
          gomobile bind -target=ios -v -o ../Frameworks/Node.xcframework ./node

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build IPA
        run: |
          xcodegen generate
          xcodebuild build \
            -project SoulNode.xcodeproj \
            -scheme SoulNode \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-IPA
          path: SoulNode.ipa
