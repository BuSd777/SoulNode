name: Build SoulNode IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          # Прописываем путь к бинарникам в PATH Гитхаба
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Go Framework
        run: |
          # 1. Заходим в папку, где лежит go.mod
          cd go
          
          # 2. Скачиваем зависимости мобильной платформы правильно (внутри модуля)
          go mod tidy
          go get golang.org/x/mobile/bind
          
          # 3. Инициализируем gomobile
          gomobile init
          
          # 4. Создаем папку для фреймворка
          mkdir -p ../Frameworks
          
          # 5. Собираем. Указываем пакет ./node относительно текущей папки
          gomobile bind -target=ios -v -o ../Frameworks/Node.xcframework ./node

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build IPA
        run: |
          xcodegen generate
          xcodebuild build \
            -project SoulNode.xcodeproj \
            -scheme SoulNode \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p Payload
          # Проверяем, где лежит приложение и упаковываем
          mv build/Release-iphoneos/SoulNode.app Payload/
          zip -r SoulNode.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoulNode-IPA
          path: SoulNode.ipa
